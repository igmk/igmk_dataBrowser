<!DOCTYPE html>
<html lang="en">
	<head>
		<meta charset="utf-8">
		<meta name="viewport" content="width=device-width, initial-scale=1.0">
		<title>Data Browser - University of Cologne: Research Group Integrated Remote Sensing</title>
		<head>
			<link rel="icon" href="img/plot_favicon.svg" type="image/svg">
			<link rel="shortcut icon" href="img/plot_favicon.svg" type="image/svg">
		</head>
		<script type="application/javascript" src="dataBrowser.js"></script>
		<link rel="stylesheet" href="dataBrowser.css">
	</head>
	<body>
		<div class="global-controls">
			<button type="button" id="treeNavBack" onclick="treeNavBack()" title="Go Back">&#8592;</button>
			<button type="button" id="mapButton" onclick="mapButton()" title="Show Map"><img src="./map/leaflet/images/marker-icon.png" class="btn-icon"><span class="btn-label">Map</span></button>
			<div id="searchContainer">
				<button type="button" id="searchToggle" onclick="toggleSearch()" title="Search">&#8981;</button>
				<input type="text" id="searchBar" placeholder="Search tags..." oninput="onSearchInput()">
			</div>
			<button type="button" id="o" onclick="newPanel()" title="Add Panel">&#43;</button>
			<div class="date-controls">
				<a class="prev arrow" onclick="updateDate(-1)">&#10094;</a>
				<input type="date" id="datePicker" name="date">
				<a class="next arrow" onclick="updateDate(1)">&#10095;</a>
			</div>
			<button type="button" id="treeNavClose" onclick="treeNavClose()" title="Close Interface">&#10005;</button>
			<img src="./img/logo.png" id="logo">
		</div>
		<!-- Panels are generated by buildPanels() in dataBrowser.js (up to MAX_PANELS). -->
		<div class="wrapper" id="plotsWrapper"></div>
		<div id="selectionMenu"></div>
		<iframe src="map/leaflet/map.html" id="mapFrame"></iframe>
	</body>
</html>
